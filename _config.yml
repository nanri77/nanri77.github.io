title: nanri77's WIL
description: Weekly I Learned — 매주 배운 것을 기록합니다.
author: nanri77
email: nanrimania@gmail.com
url: "https://nanri77.github.io"

lang: ko-KR
timezone: Asia/Seoul

theme: minima
minima:
  skin: auto
  date_format: "%Y-%m-%d"

permalink: /:year/:month/:day/:title/
paginate: 10

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore
